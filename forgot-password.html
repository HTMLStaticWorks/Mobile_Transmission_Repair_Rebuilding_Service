<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ShiftFix Service</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, var(--primary-color), transparent),
                        radial-gradient(circle at bottom left, var(--secondary-color), transparent),
                        var(--card-bg);
            background-blend-mode: overlay;
            padding: 2rem;
            transition: var(--transition);
        }
        .auth-card {
            background: var(--bg-color);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }
        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: inherit;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo" style="margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none;">
                <img src="assets/mechanical_logo.png" alt="Logo" style="height: 50px;">
                <span style="font-size: 1.75rem; font-weight: 800; color: var(--primary-color); letter-spacing: -1px;">ShiftFix</span>
            </a>
        </div>
        <h2 style="margin-bottom: 0.5rem;">Reset Password</h2>
        <p style="opacity: 0.6; margin-bottom: 2.5rem;">Enter your email to receive recovery instructions</p>

        <form onsubmit="handleReset(event)">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Send Reset Link</button>
        </form>

        <p style="margin-top: 2.5rem; font-size: 0.9rem;">
            Remembered your password? <a href="login.html" style="color: var(--primary-color); font-weight: 700;">Back to Login</a>
        </p>
    </div>

    <script src="js/main.js"></script>
    <script>
        function handleReset(e) {
            e.preventDefault();
            alert('Reset link has been sent to your email address.');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
