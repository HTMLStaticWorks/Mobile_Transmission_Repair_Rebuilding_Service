<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ShiftFix Service</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Styles -->
    <link rel="shortcut icon" href="assets/shiftfix_logo.svg" type="image/svg+xml">
    <link rel="icon" href="assets/shiftfix_logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, var(--primary-color), transparent),
                        radial-gradient(circle at bottom left, var(--secondary-color), transparent),
                        var(--card-bg);
            background-blend-mode: overlay;
            padding: 2rem;
            transition: var(--transition);
        }
        .auth-card {
            background: var(--bg-color);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }
        .auth-toggles {
            position: fixed;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.75rem;
            z-index: 1000;
        }
        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: inherit;
            font-size: 1rem;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.5;
            z-index: 10;
        }
        .social-login {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            background: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .social-btn:hover {
            background: var(--card-bg);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .auth-card a {
            transition: var(--transition);
            display: inline-block;
        }
        .auth-card a:hover {
            color: var(--secondary-color) !important;
            transform: translateY(-1px);
        }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            .auth-card { padding: 2rem 1.5rem; }
            .social-login { grid-template-columns: 1fr; }
            .auth-toggles { top: 1rem; right: 1rem; }
        }
    </style>
</head>
<body>

    <div class="auth-toggles">
        <button onclick="toggleTheme()" class="toggle-btn theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <button onclick="toggleRTL()" class="toggle-btn" title="Toggle RTL"><i class="fas fa-right-left"></i></button>
    </div>

    <div class="auth-card">
        <div class="logo" style="margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none;">
                <img src="assets/shiftfix_logo.svg" alt="Logo" style="height: 50px;">
                <span style="font-size: 1.75rem; font-weight: 800; color: var(--primary-color); letter-spacing: -1px;">ShiftFix</span>
            </a>
        </div>
        <h2 style="margin-bottom: 0.5rem;">Create Account</h2>
        <p style="opacity: 0.6; margin-bottom: 2.5rem;">Join our community for expert service</p>

        <form action="dashboard.html">
            <div class="input-group">
                <label>First Name</label>
                <input type="text" placeholder="John" required>
            </div>
            <div class="input-group">
                <label>Last Name</label>
                <input type="text" placeholder="Doe" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
                </div>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('confirm-password', this)"></i>
                </div>
                <div style="margin-top: 1.5rem; margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.85rem; cursor: pointer; opacity: 0.9; font-weight: 500; text-align: left;">
                        <input type="checkbox" required style="width: 18px; height: 18px; margin: 0; margin-top: 0.2rem; cursor: pointer; accent-color: var(--primary-color); flex-shrink: 0;"> 
                        <span>I agree to the <a href="#" style="color: var(--primary-color); font-weight: 600; text-decoration: underline;">Terms & Conditions</a> and <a href="#" style="color: var(--primary-color); font-weight: 600; text-decoration: underline;">Privacy Policy</a></span>
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
        </form>

        <div style="margin-top: 2rem; position: relative;">
            <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--border-color); z-index: 1;"></div>
            <span style="position: relative; z-index: 2; background: var(--bg-color); padding: 0 1rem; font-size: 0.8rem; opacity: 0.6;">OR JOIN WITH</span>
        </div>

        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-apple"></i> Apple</button>
        </div>

        <p style="margin-top: 2.5rem; font-size: 0.9rem;">
            Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 700;">Log In</a>
        </p>
    </div>

    <script src="js/main.js"></script>
    <script>
        function togglePassword(id, icon) {
            const pwd = document.getElementById(id);
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fas fa-eye-slash password-toggle';
            } else {
                pwd.type = 'password';
                icon.className = 'fas fa-eye password-toggle';
            }
        }
    </script>
</body>
</html>
