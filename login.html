<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShiftFix Service</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, var(--primary-color), transparent),
                        radial-gradient(circle at bottom left, var(--secondary-color), transparent),
                        var(--card-bg);
            background-blend-mode: overlay;
            padding: 2rem;
            transition: var(--transition);
        }
        .auth-card {
            background: var(--bg-color);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }
        .auth-toggles {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.5rem;
        }
        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: inherit;
            font-size: 1rem;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 2.3rem;
            cursor: pointer;
            opacity: 0.5;
        }
        .auth-extra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .social-login {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .social-btn:hover {
            background: var(--card-bg);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>
    <div class="auth-toggles">
        <button onclick="toggleTheme()" class="toggle-btn theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <button onclick="toggleRTL()" class="toggle-btn" title="Toggle RTL"><i class="fas fa-language"></i></button>
    </div>

    <div class="auth-card">
        <div class="logo" style="margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none;">
                <img src="assets/mechanical_logo.png" alt="Logo" style="height: 50px;">
                <span style="font-size: 1.75rem; font-weight: 800; color: var(--primary-color); letter-spacing: -1px;">ShiftFix</span>
            </a>
        </div>
        <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="opacity: 0.6; margin-bottom: 2.5rem;">Log in to access your dashboard</p>

        <form action="dashboard.html">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
            </div>
            <div class="auth-extra">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" style="color: var(--primary-color); font-weight: 600;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Log In</button>
        </form>

        <div style="margin-top: 2rem; position: relative;">
            <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--border-color); z-index: 1;"></div>
            <span style="position: relative; z-index: 2; background: var(--bg-color); padding: 0 1rem; font-size: 0.8rem; opacity: 0.6;">OR CONTINUE WITH</span>
        </div>

        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-apple"></i> Apple</button>
        </div>

        <p style="margin-top: 2.5rem; font-size: 0.9rem;">
            Don't have an account? <a href="signup.html" style="color: var(--primary-color); font-weight: 700;">Sign Up</a>
        </p>
    </div>

    <script src="js/main.js"></script>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.password-toggle');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fas fa-eye-slash password-toggle';
            } else {
                pwd.type = 'password';
                icon.className = 'fas fa-eye password-toggle';
            }
        }
    </script>
</body>
</html>
